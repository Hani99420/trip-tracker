<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GuardianSync | Pro</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.css" />
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.js"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs/qrcode.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
        body, html { height: 100%; width: 100%; overflow: hidden; font-family: 'Poppins', sans-serif; background: #000; color: white; }

        .page { display: none; height: 100vh; width: 100vw; position: fixed; top: 0; left: 0; z-index: 10; }
        #intro-page.active { display: flex; flex-direction: column; align-items: center; justify-content: center; }
        #map-page.active { display: block; }

        #intro-page { background: radial-gradient(circle at center, #111 0%, #000 100%); }
        .logo-glow { font-size: 4rem; animation: logoPulse 3s infinite; }
        .main-title { letter-spacing: 6px; text-transform: uppercase; font-size: 1.8rem; margin: 10px 0; text-align: center; }
        .btn-elegant { padding: 12px 40px; color: #22c55e; border: 1px solid #22c55e; background: none; border-radius: 4px; cursor: pointer; letter-spacing: 2px; font-weight: 600; }

        #map { height: 100vh; width: 100vw; position: absolute; top: 0; left: 0; z-index: 1; }

        .ui-layer { position: absolute; top: 0; left: 0; z-index: 1000; width: 100%; height: 100%; padding: 15px; pointer-events: none; display: flex; flex-direction: column; justify-content: space-between; }
        .top-bar { display: flex; justify-content: space-between; pointer-events: auto; }
        
        /* Premium Status Bar */
        .status { background: rgba(0,0,0,0.85); padding: 5px 12px; border-radius: 20px; font-size: 0.7rem; border: 1px solid #22c55e; color: #22c55e; font-weight: 600; }
        
        /* Glassmorphism Chat Box */
        .chat-container { 
            width: 100%; max-width: 320px; 
            background: rgba(0,0,0,0.7) !important; 
            backdrop-filter: blur(10px); 
            -webkit-backdrop-filter: blur(10px);
            border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); 
            padding: 12px; pointer-events: auto !important; margin-bottom: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        #chat-logs { height: 100px; overflow-y: auto; font-size: 0.8rem; color: #ccc; margin-bottom: 10px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .chat-input-area { display: flex; gap: 8px; }
        #chat-msg { background: rgba(0,0,0,0.5); border: 1px solid #22c55e; color: white; padding: 10px; border-radius: 6px; flex-grow: 1; font-size: 14px; }
        .send-btn { background: #22c55e; border: none; padding: 0 15px; border-radius: 6px; font-weight: bold; cursor: pointer; color: #000; }

        #admin-panel { position: absolute; top: 75px; right: 15px; background: rgba(40,0,0,0.85); border: 1px solid #ff3b3b; padding: 10px; border-radius: 8px; z-index: 1001; pointer-events: auto; display: none; backdrop-filter: blur(5px); }
        .admin-btn { background: #ff3b3b; color: white; border: none; padding: 4px 8px; font-size: 0.6rem; border-radius: 4px; cursor: pointer; font-weight: bold; margin-top: 5px; }

        .dest-beacon { position: relative; display: flex; align-items: center; justify-content: center; }
        .beacon-ring { position: absolute; width: 40px; height: 40px; background: rgba(239, 68, 68, 0.4); border-radius: 50%; animation: beaconPulse 1.5s infinite; }
        .beacon-center { width: 14px; height: 14px; background: #ef4444; border: 2px solid white; border-radius: 50%; z-index: 2; }
        .dest-label { position: absolute; top: -25px; background: #ef4444; color: white; padding: 2px 8px; border-radius: 4px; font-size: 9px; font-weight: bold; white-space: nowrap; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }

        .route-dist-tag { background: #1a73e8; color: white; padding: 4px 10px; border-radius: 12px; font-size: 10px; font-weight: bold; border: 1.5px solid white; box-shadow: 0 2px 8px rgba(0,0,0,0.4); white-space: nowrap; }

        /* Keyframes */
        @keyframes beaconPulse { 0% { transform: scale(0.5); opacity: 1; } 100% { transform: scale(2.5); opacity: 0; } }
        @keyframes logoPulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
        @keyframes hostGlow {
            0% { box-shadow: 0 0 5px rgba(255, 215, 0, 0.4); }
            50% { box-shadow: 0 0 15px rgba(255, 215, 0, 0.8); }
            100% { box-shadow: 0 0 5px rgba(255, 215, 0, 0.4); }
        }
        
        .leaflet-routing-container { display: none !important; }
        #qr-modal { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 25px; border-radius: 15px; display: none; z-index: 2000; text-align: center; color: black; pointer-events: auto; }
    </style>
</head>
<body>

    <div id="intro-page" class="page active">
        <div class="logo-glow">🛡️</div>
        <h1 class="main-title">GuardianSync</h1>
        <div style="font-size:0.7rem; color:#475569; letter-spacing:4px; margin-bottom:40px;">SECURE LIVE TRACKING</div>
        <button class="btn-elegant" id="entry-btn" onclick="launchApp()">INITIALIZE SYSTEM</button>
        <div style="position: absolute; bottom: 30px; font-size: 0.6rem; letter-spacing: 5px; color: #334155;">DESIGNED BY HANI</div>
    </div>

    <div id="map-page" class="page">
        <div id="map"></div>
        <div class="ui-layer">
            <div class="top-bar">
                <div class="status" id="role-display">● SECURE NODE</div>
                <div style="display: flex; gap: 8px;">
                    <button id="host-qr-btn" style="background:#22c55e; border:none; padding:6px 15px; border-radius:20px; font-size:0.7rem; font-weight:bold; color:black;" onclick="toggleQR()">SHARE</button>
                    <button onclick="leaveSession()" style="background:#333; color:white; border:none; padding:6px 15px; border-radius:20px; font-size:0.7rem;">LEAVE</button>
                </div>
            </div>

            <div id="admin-panel">
                <p style="font-size: 0.6rem; color: #ff3b3b; font-weight: bold; margin-bottom: 5px;">HOST COMMAND</p>
                <div id="user-list"></div>
                <button class="admin-btn" style="width:100%;" onclick="nuclearReset()">WIPE ALL DATA</button>
            </div>

            <div class="chat-container">
                <div id="chat-logs">System ready...</div>
                <div class="chat-input-area">
                    <input type="text" id="chat-msg" placeholder="Broadcast message...">
                    <button class="send-btn" onclick="sendMessage()">➤</button>
                </div>
            </div>
        </div>
        
        <div id="qr-modal">
            <div id="qrcode"></div>
            <p style="font-size:11px; margin-top:10px; font-weight:bold;">SCAN TO JOIN</p>
            <button onclick="toggleQR()" style="color:red; margin-top:15px; border:none; background:none; font-weight:bold;">CLOSE</button>
        </div>
    </div>

<script>
    const firebaseConfig = {
      apiKey: "AIzaSyA2WVIQ3UzX5eF--0qdGX0Xv5rGZY5VcAw",
      authDomain: "location-tracker-6fa7b.firebaseapp.com",
      databaseURL: "https://location-tracker-6fa7b-default-rtdb.firebaseio.com",
      projectId: "location-tracker-6fa7b",
      storageBucket: "location-tracker-6fa7b.firebasestorage.app",
      messagingSenderId: "771776177126",
      appId: "1:771776177126:web:9ead884cf89d828df96c27",
      measurementId: "G-CS9EZWMVZ2"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const isHost = !window.location.hash;
    const groupId = window.location.hash.substring(1) || Math.random().toString(36).substr(2, 6);
    if (isHost) window.location.hash = groupId;

    const userId = Math.random().toString(36).substr(2, 4);
    let myName = "", isFirstPosition = true, isKicked = false, watchId = null;
    let myPos = null, destPos = null, roadLine = null, roadGlow = null, distMarker = null;
    const markers = {};
    let destMarker = null;

    if (!isHost) {
        document.getElementById('entry-btn').innerText = "JOIN FAMILY SESSION";
        document.getElementById('host-qr-btn').style.display = 'none';
    }

    const map = L.map('map', { zoomControl: false, attributionControl: false }).setView([20.5937, 78.9629], 5);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
    new QRCode(document.getElementById("qrcode"), { text: window.location.href, width: 150, height: 150 });

    window.addEventListener('resize', () => map.invalidateSize());

    function launchApp() {
        let rawName = prompt("Enter Name:") || "User";
        myName = rawName.replace(/[^\w\s]/gi, '').trim() || "User";

        document.getElementById('intro-page').classList.remove('active');
        document.getElementById('map-page').classList.add('active');
        setTimeout(() => map.invalidateSize(), 300);

        if (isHost) {
            document.getElementById('admin-panel').style.display = 'block';
            document.getElementById('role-display').innerText = "⭐ COMMAND HOST";
            document.getElementById('role-display').style.color = "gold";
            document.getElementById('role-display').style.borderColor = "gold";
            document.getElementById('role-display').style.animation = "hostGlow 2s infinite";
        }
        startGuardian();
    }

    async function updateNavLine() {
        if (roadLine) map.removeLayer(roadLine);
        if (roadGlow) map.removeLayer(roadGlow);
        if (distMarker) map.removeLayer(distMarker);

        if (!myPos || !destPos) return;

        try {
            const query = await fetch(`https://router.project-osrm.org/route/v1/driving/${myPos[1]},${myPos[0]};${destPos[1]},${destPos[0]}?overview=full&geometries=geojson`);
            const data = await query.json();
            
            if (data.routes && data.routes.length > 0) {
                const route = data.routes[0];
                const coords = route.geometry.coordinates.map(c => [c[1], c[0]]);
                
                roadGlow = L.polyline(coords, { color: '#007bff', weight: 12, opacity: 0.3 }).addTo(map);
                roadLine = L.polyline(coords, { color: '#1a73e8', weight: 4, opacity: 1 }).addTo(map);

                const d = route.distance;
                const distText = d > 1000 ? (d/1000).toFixed(1) + " km" : Math.round(d) + " m";
                const etaMinutes = Math.round(route.duration / 60);
                const etaText = etaMinutes > 60 ? Math.floor(etaMinutes/60) + "h " + (etaMinutes%60) + "m" : etaMinutes + " min";

                distMarker = L.marker(myPos, {
                    icon: L.divIcon({ 
                        className: 'rt-tag', 
                        html: `<div class="route-dist-tag">${distText} • ${etaText}</div>`, 
                        iconAnchor: [0, -30] 
                    })
                }).addTo(map);
            }
        } catch (e) { console.error("Nav error:", e); }
    }

    function startGuardian() {
        const myColor = isHost ? "orange" : '#' + Math.floor(Math.random()*16777215).toString(16);

        if (navigator.geolocation) {
            watchId = navigator.geolocation.watchPosition((pos) => {
                if (isKicked) return;
                const { latitude, longitude, speed } = pos.coords;
                const kmh = speed ? Math.round(speed * 3.6) : 0;
                myPos = [latitude, longitude];
                
                db.ref(`groups/${groupId}/users/${userId}`).set({ 
                    lat: latitude, lng: longitude, name: myName, color: myColor, speed: kmh, isHost: isHost 
                });
                db.ref(`groups/${groupId}/users/${userId}`).onDisconnect().remove();
                if (isFirstPosition) { map.setView(myPos, 16); isFirstPosition = false; }
                updateNavLine();
            }, null, { enableHighAccuracy: true });
        }

        db.ref(`groups/${groupId}/users/${userId}`).on('value', (snapshot) => {
            if (!snapshot.exists() && !isFirstPosition) {
                isKicked = true;
                if (watchId) navigator.geolocation.clearWatch(watchId);
                alert("⚠️ ALERT: Host want you to go back or leave the session.");
                location.reload();
            }
        });

        if (isHost) {
            map.on('contextmenu', (e) => {
                db.ref(`groups/${groupId}/dest`).set({ lat: e.latlng.lat, lng: e.latlng.lng });
                db.ref(`groups/${groupId}/chat`).push({ user: "SYSTEM", text: "🔄 Host changed his mind! Target updated." });
                if (navigator.vibrate) navigator.vibrate(50);
            });
        }

        db.ref(`groups/${groupId}/dest`).on('value', (s) => {
            const d = s.val();
            if (d) {
                destPos = [d.lat, d.lng];
                if (destMarker) map.removeLayer(destMarker);
                destMarker = L.marker(destPos, {
                    icon: L.divIcon({ 
                        className: 'dest-beacon', 
                        html: '<div class="dest-label">TARGET</div><div class="beacon-ring"></div><div class="beacon-center"></div>',
                        iconSize: [40, 40]
                    })
                }).addTo(map);
                updateNavLine();
            }
        });

        db.ref(`groups/${groupId}/chat`).limitToLast(15).on('child_added', (s) => {
            const m = s.val();
            const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            const logs = document.getElementById('chat-logs');
            logs.innerHTML += `<div style="margin-bottom:4px;"><span style="font-size:9px; color:#888;">${time}</span> <b>${m.user}:</b> ${m.text}</div>`;
            logs.scrollTop = logs.scrollHeight;
        });

        db.ref(`groups/${groupId}/users`).on('value', (snapshot) => {
            const users = snapshot.val();
            if (!users && !isHost) { location.reload(); }
            const adminList = document.getElementById('user-list');
            if (isHost) adminList.innerHTML = "";
            for (let id in users) {
                const u = users[id];
                const uCol = u.color || '#22c55e';
                const uSpeed = u.speed || 0;
                const badge = u.isHost ? "⭐ " : "";
                const hostStyle = u.isHost ? "animation: hostGlow 2s infinite;" : "";

                if (isHost && id !== userId) {
                    adminList.innerHTML += `<div style="font-size:0.6rem; display:flex; justify-content:space-between; margin-bottom:5px;">${u.name} <button class="admin-btn" onclick="kickUser('${id}')">REMOVE</button></div>`;
                }

                const icon = L.divIcon({
                    className: 'c-icon',
                    html: `<div style="display:flex; flex-direction:column; align-items:center;">
                            <div style="background:rgba(255,255,255,0.95); color:black; padding:2px 8px; border-radius:10px; font-size:10px; border:2px solid ${uCol}; white-space:nowrap; font-weight:bold; box-shadow: 0 4px 10px rgba(0,0,0,0.3); ${hostStyle}">
                                ${badge}${u.name} ${uSpeed > 2 ? '• ' + uSpeed + ' km/h' : ''}
                            </div>
                            <div style="width:12px; height:12px; background:${uCol}; border:2.5px solid #fff; border-radius:50%; margin-top:3px; box-shadow: 0 4px 8px rgba(0,0,0,0.4);"></div>
                          </div>`,
                    iconSize: [40, 60], iconAnchor: [20, 60]
                });
                if (markers[id]) { markers[id].setLatLng([u.lat, u.lng]); markers[id].setIcon(icon); } 
                else { markers[id] = L.marker([u.lat, u.lng], { icon: icon }).addTo(map); }
            }
            for (let id in markers) { if (!users || !users[id]) { map.removeLayer(markers[id]); delete markers[id]; } }
        });
    }

    function sendMessage() {
        const input = document.getElementById('chat-msg');
        if (input.value.trim()) {
            db.ref(`groups/${groupId}/chat`).push({ user: myName, text: input.value.trim() });
            input.value = "";
        }
    }
    function kickUser(id) { 
        if (confirm("Remove user?")) {
            db.ref(`groups/${groupId}/chat`).push({ user: "SYSTEM", text: "⚠️ Host requested a user to go back." });
            db.ref(`groups/${groupId}/users/${id}`).remove(); 
        }
    }
    function nuclearReset() { if (confirm("WIPE ENTIRE MAP?")) { db.ref(`groups/${groupId}`).remove().then(()=>location.reload()); } }
    function leaveSession() { db.ref(`groups/${groupId}/users/${userId}`).remove(); location.reload(); }
    function toggleQR() { const m = document.getElementById('qr-modal'); m.style.display = m.style.display === 'block' ? 'none' : 'block'; }
</script>
</body>
</html>
